<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summa — Support</title>
  <style>
    :root { --paper: #efe7d6; --ink: #2b2622; --muted: #6b6157; --accent: #b9895a; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: var(--paper); color: var(--ink);
      font-family: Georgia, 'Times New Roman', serif;
      padding: 24px; line-height: 1.6;
    }
    main { max-width: 460px; width: 100%; text-align: center; }
    h1 { font-size: 2rem; margin: 0 0 .5rem; letter-spacing: .02em; }
    .tag { color: var(--muted); font-size: 1rem; margin: 0 0 2rem; }
    .card {
      background: rgba(255,255,255,.35);
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 16px; padding: 28px 24px;
    }
    .label { color: var(--muted); font-size: .85rem; text-transform: uppercase; letter-spacing: .08em; margin: 0 0 .4rem; }
    a { color: var(--accent); text-decoration: none; font-weight: bold; }
    a:hover { text-decoration: underline; }
    .email { font-size: 1.15rem; word-break: break-all; }
    footer { margin-top: 2rem; font-size: .8rem; color: var(--muted); }
    footer a { color: var(--muted); font-weight: normal; }
  </style>
</head>
<body>
  <main>
    <h1>Summa</h1>
    <p class="tag">Number puzzles, relaxed.</p>
    <div class="card">
      <p class="label">Support &amp; Feedback</p>
      <p>Questions, bug reports, or ideas? We'd love to hear from you.</p>
      <p class="email"><a href="mailto:summa.customersupport@gmail.com">summa.customersupport@gmail.com</a></p>
    </div>
    <footer>
      <p>&copy; 2026 Barak Bukra &middot; <a href="./index.html">Privacy Policy</a></p>
    </footer>
  </main>
</body>
</html>
